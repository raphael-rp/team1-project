<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fitness Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>Fitness Dashboard</h1>
</header>

<nav>
    <a href="index.html">Dashboard</a>
    <a href="add.html">Add Workout</a>
</nav>

<div class="container">

    <h2>Workout Progress</h2>

    <canvas id="chart"></canvas>

    <h3>Saved Workouts</h3>
    <div id="list"></div>

    <!-- ✅ CLEAR BUTTON MOVED HERE -->
    <button onclick="clearAll()" style="background:red; margin-top:15px;">
        Clear All Data
    </button>

</div>

<script>
let chart;

function getData() {
    return JSON.parse(localStorage.getItem("workouts")) || [];
}

function saveData(data) {
    localStorage.setItem("workouts", JSON.stringify(data));
}

function deleteItem(index) {
    let data = getData();
    data.splice(index, 1);
    saveData(data);
    render();
}

function clearAll() {
    if (confirm("Are you sure you want to clear ALL workouts?")) {
        localStorage.removeItem("workouts");
        render();
    }
}

// ⏱ SORT BY REAL TIME
function sortData(data) {
    return data
        .map(d => ({
            ...d,
            datetime: new Date(d.date + "T" + d.time)
        }))
        .sort((a, b) => a.datetime - b.datetime);
}

// 📊 MULTI-LINE GRAPH PER WORKOUT TYPE
function buildChart(data) {

    let sorted = sortData(data);

    let labels = sorted.map(d => d.date + " " + d.time);

    let grouped = {};

    sorted.forEach(d => {
        if (!grouped[d.activity]) grouped[d.activity] = {};
        let key = d.date + " " + d.time;
        grouped[d.activity][key] = Number(d.minutes);
    });

    let colors = ["#22c55e", "#3b82f6", "#f97316", "#a855f7", "#ef4444"];
    let i = 0;

    let datasets = Object.keys(grouped).map(type => {
        let map = grouped[type];

        return {
            label: type,
            data: labels.map(l => map[l] || 0),
            borderColor: colors[i++ % colors.length],
            fill: false,
            tension: 0.3
        };
    });

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels,
            datasets
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

// 🧠 RENDER EVERYTHING
function render() {
    let data = getData();

    if (data.length === 0) {
        document.getElementById("list").innerHTML = "<p>No workouts yet</p>";
        if (chart) chart.destroy();
        return;
    }

    buildChart(data);

    document.getElementById("list").innerHTML = data.map((d, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;
        padding:10px;border-bottom:1px solid #ddd;">

            <div>
                <b>${d.activity}</b><br>
                ${d.date} ${d.time} — ${d.minutes} min
            </div>

            <button onclick="deleteItem(${i})"
            style="background:#ef4444;width:80px;">
                Delete
            </button>

        </div>
    `).join("");
}

render();
</script>

</body>
</html>
